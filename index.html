<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Определение устройства</title>
</head>
<body style="margin:0; padding:0; background:white;">
    <script>
        const siteName = 'mysite';
        
        const basePath = window.location.hostname.includes('github.io') 
            ? '/' + window.location.pathname.split('/')[1] + '/' 
            : '/';
        
        function detectDevice() {
            const ua = navigator.userAgent.toLowerCase();
            let type = 'desktop';
            
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobile))/i.test(ua)) {
                type = 'tablet';
            } else if (/mobile|android|iphone|ipod|blackberry|webos/i.test(ua)) {
                type = 'mobile';
            } else if (/smart-tv|smarttv|appletv|googletv|hbbtv/i.test(ua)) {
                type = 'tv';
            }
            
            if (window.screen.width <= 768 && type !== 'tablet') type = 'mobile';
            else if (window.screen.width <= 1024 && window.screen.width > 768 && type === 'desktop') type = 'tablet';
            
            return type;
        }
        
        function loadSite() {
            const forced = localStorage.getItem('forcedVersion');
            const version = forced || detectDevice();
            window.location.href = `${basePath}sites/${siteName}_${version}.html`;
        }
        
        window.addEventListener('DOMContentLoaded', loadSite);
    </script>
</body>
</html>
