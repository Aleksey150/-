<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

    <script>
        function detectDevice() {
            const ua = navigator.userAgent.toLowerCase();
            const infoDiv = document.getElementById('info');
            
            let deviceInfo = {
                type: 'desktop',
                isMobile: false,
                isTablet: false,
                isDesktop: true,
                isTV: false,
                userAgent: navigator.userAgent,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                touchSupport: 'ontouchstart' in window
            };
            
            infoDiv.innerHTML = `
                <strong>User-Agent:</strong> ${navigator.userAgent}<br>
                <strong>Экран:</strong> ${window.screen.width}×${window.screen.height}px<br>
                <strong>Touch:</strong> ${deviceInfo.touchSupport ? 'Да' : 'Нет'}<br>
                <strong>Платформа:</strong> ${navigator.platform}<br>
                <strong>Язык:</strong> ${navigator.language}
            `;
            
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobile))/i.test(ua)) {
                deviceInfo.type = 'tablet';
                deviceInfo.isTablet = true;
                deviceInfo.isDesktop = false;
            } else if (/mobile|android|iphone|ipod|blackberry|webos/i.test(ua)) {
                deviceInfo.type = 'mobile';
                deviceInfo.isMobile = true;
                deviceInfo.isDesktop = false;
            } else if (/smart-tv|smarttv|appletv|googletv|hbbtv|crkey/i.test(ua)) {
                deviceInfo.type = 'tv';
                deviceInfo.isTV = true;
                deviceInfo.isDesktop = false;
            }
            
            if (window.screen.width <= 768 && !deviceInfo.isTablet) {
                deviceInfo.type = 'mobile';
                deviceInfo.isMobile = true;
                deviceInfo.isDesktop = false;
            } else if (window.screen.width <= 1024 && window.screen.width > 768) {
                if (!deviceInfo.isMobile && !deviceInfo.isTablet) {
                    deviceInfo.type = 'tablet';
                    deviceInfo.isTablet = true;
                    deviceInfo.isDesktop = false;
                }
            }
            
            return deviceInfo;
        }
        
        function loadSiteVersion(version = null) {
            const device = detectDevice();
            const forcedVersion = localStorage.getItem('forcedVersion');
            
            let finalVersion;
            if (version) {
                finalVersion = version;
                localStorage.setItem('forcedVersion', version);
            } else if (forcedVersion) {
                finalVersion = forcedVersion;
            } else {
                finalVersion = device.type;
            }
            
            // Имя твоего сайта (ПОМЕНЯЙ ЗДЕСЬ!)
            const siteName = 'mysite';
            
            const isGitHubPages = window.location.hostname.includes('github.io');
            let basePath = '-';
            
            if (isGitHubPages) {
                const pathParts = window.location.pathname.split('/');
                if (pathParts.length > 2) {
                    // Формат: /username/repo-name/
                    basePath = '/' + pathParts[1] + '/' + pathParts[2] + '/';
                }
            }
            
            const siteUrl = `${basePath}sites/${siteName}_${finalVersion}.html`;
            
            document.getElementById('info').innerHTML += `
                <br><br><strong>Определено как:</strong> ${device.type}<br>
                <strong>Загружаем:</strong> ${finalVersion} версию<br>
                <strong>Файл:</strong> ${siteUrl}
            `;
            
            setTimeout(() => {
                window.location.href = siteUrl;
            }, 0000);
        }
        
        function forceVersion(version) {
            localStorage.setItem('forcedVersion', version);
            document.getElementById('info').innerHTML += `<br><br><strong>Принудительно:</strong> ${version}`;
            setTimeout(() => {
                loadSiteVersion(version);
            }, 0);
        }
        
        // Очистка принудительной версии
        function clearForcedVersion() {
            localStorage.removeItem('forcedVersion');
        }
        
        // Автозапуск при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            // Проверяем, не перешли ли мы уже с версией сайта
            const urlParams = new URLSearchParams(window.location.search);
            const force = urlParams.get('force');
            
            if (force) {
                loadSiteVersion(force);
            } else {
                loadSiteVersion();
            }
        });
    </script>
</body>
</html>
