<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Определение устройства</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .loader-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        
        p {
            color: #666;
            margin-bottom: 20px;
        }
        
        .device-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 12px;
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="loader"></div>
        <h1>Определяем ваше устройство...</h1>
        <p>Загружаем оптимальную версию сайта</p>
        
        <div class="device-info">
            <div id="info">Идет анализ User-Agent...</div>
        </div>
        
        <div style="margin-top: 20px;">
            <button onclick="forceVersion('desktop')" style="margin: 5px;">💻 Десктоп</button>
            <button onclick="forceVersion('mobile')" style="margin: 5px;">📱 Мобильная</button>
            <button onclick="forceVersion('tablet')" style="margin: 5px;">📟 Планшет</button>
            <button onclick="forceVersion('tv')" style="margin: 5px;">📺 ТВ</button>
        </div>
    </div>

    <script>
        // Детектор устройств
        function detectDevice() {
            const ua = navigator.userAgent.toLowerCase();
            const infoDiv = document.getElementById('info');
            
            let deviceInfo = {
                type: 'desktop',
                isMobile: false,
                isTablet: false,
                isDesktop: true,
                isTV: false,
                userAgent: navigator.userAgent,
                screenWidth: window.screen.width,
                screenHeight: window.screen.height,
                touchSupport: 'ontouchstart' in window
            };
            
            // Показываем информацию в реальном времени
            infoDiv.innerHTML = `
                <strong>User-Agent:</strong> ${navigator.userAgent}<br>
                <strong>Экран:</strong> ${window.screen.width}×${window.screen.height}px<br>
                <strong>Touch:</strong> ${deviceInfo.touchSupport ? 'Да' : 'Нет'}<br>
                <strong>Платформа:</strong> ${navigator.platform}<br>
                <strong>Язык:</strong> ${navigator.language}
            `;
            
            // Определяем тип устройства
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobile))/i.test(ua)) {
                deviceInfo.type = 'tablet';
                deviceInfo.isTablet = true;
                deviceInfo.isDesktop = false;
            } else if (/mobile|android|iphone|ipod|blackberry|webos/i.test(ua)) {
                deviceInfo.type = 'mobile';
                deviceInfo.isMobile = true;
                deviceInfo.isDesktop = false;
            } else if (/smart-tv|smarttv|appletv|googletv|hbbtv|crkey/i.test(ua)) {
                deviceInfo.type = 'tv';
                deviceInfo.isTV = true;
                deviceInfo.isDesktop = false;
            }
            
            // Дополнительные проверки по размеру экрана
            if (window.screen.width <= 768 && !deviceInfo.isTablet) {
                deviceInfo.type = 'mobile';
                deviceInfo.isMobile = true;
                deviceInfo.isDesktop = false;
            } else if (window.screen.width <= 1024 && window.screen.width > 768) {
                if (!deviceInfo.isMobile && !deviceInfo.isTablet) {
                    deviceInfo.type = 'tablet';
                    deviceInfo.isTablet = true;
                    deviceInfo.isDesktop = false;
                }
            }
            
            return deviceInfo;
        }
        
        // Загружаем нужную версию сайта
        function loadSiteVersion(version = null) {
            const device = detectDevice();
            const forcedVersion = localStorage.getItem('forcedVersion');
            
            // Определяем финальную версию
            let finalVersion;
            if (version) {
                finalVersion = version;
                localStorage.setItem('forcedVersion', version);
            } else if (forcedVersion) {
                finalVersion = forcedVersion;
            } else {
                finalVersion = device.type;
            }
            
            // Имя твоего сайта (ПОМЕНЯЙ ЗДЕСЬ!)
            const siteName = 'mysite';
            
            // Для GitHub Pages: получаем базовый путь
            const isGitHubPages = window.location.hostname.includes('github.io');
            let basePath = '';
            
            if (isGitHubPages) {
                // Получаем путь к репозиторию из URL
                const pathParts = window.location.pathname.split('/');
                if (pathParts.length > 2) {
                    // Формат: /username/repo-name/
                    basePath = '/' + pathParts[1] + '/' + pathParts[2] + '/';
                }
            }
            
            // Формируем URL к нужной версии
            const siteUrl = `${basePath}sites/${siteName}_${finalVersion}.html`;
            
            // Показываем информацию
            document.getElementById('info').innerHTML += `
                <br><br><strong>Определено как:</strong> ${device.type}<br>
                <strong>Загружаем:</strong> ${finalVersion} версию<br>
                <strong>Файл:</strong> ${siteUrl}
            `;
            
            // Загружаем сайт через 2 секунды (чтобы увидеть информацию)
            setTimeout(() => {
                window.location.href = siteUrl;
            }, 2000);
        }
        
        // Принудительное переключение версии
        function forceVersion(version) {
            localStorage.setItem('forcedVersion', version);
            document.getElementById('info').innerHTML += `<br><br><strong>Принудительно:</strong> ${version}`;
            setTimeout(() => {
                loadSiteVersion(version);
            }, 1000);
        }
        
        // Очистка принудительной версии
        function clearForcedVersion() {
            localStorage.removeItem('forcedVersion');
        }
        
        // Автозапуск при загрузке
        window.addEventListener('DOMContentLoaded', () => {
            // Проверяем, не перешли ли мы уже с версией сайта
            const urlParams = new URLSearchParams(window.location.search);
            const force = urlParams.get('force');
            
            if (force) {
                loadSiteVersion(force);
            } else {
                loadSiteVersion();
            }
        });
    </script>
</body>
</html>
